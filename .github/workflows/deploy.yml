name: Deploy Dev Console (DEPRECATED — manual only)

# The dev console is retired in favor of the local Elle workbench (the Elle
# repo). No automatic deploys: this can only be run by hand, and exists only
# until the Pages project is deleted.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy
        run: npx wrangler pages deploy dist --project-name=elle-dev-console --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
